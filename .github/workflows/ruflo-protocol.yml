name: Ruflo Protocol Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  actions: read

jobs:
  run-ruflo-protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate protocol.txt
        run: node scripts/validate-protocol.mjs

      - name: Install Ruflo
        run: npm install -g ruflo@latest

      - name: Execute Ruflo protocol
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: npm run run:protocol

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ruflo-protocol-output
          path: |
            ruflo-output.json
            ruflo-output.md
            ruflo-run-metadata.json
          if-no-files-found: warn
