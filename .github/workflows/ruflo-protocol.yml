name: Ruflo Research Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  NODE_ENV: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: npm install
      
      - name: Initialize Ruflo
        run: npx ruflo@latest init --force
      
      - name: Initialize Ruflo memory
        run: npx ruflo@latest memory init
      
      - name: Start Ruflo daemon
        run: npx ruflo@latest start
      
      - name: Verify protocol exists
        run: |
          test -f protocol.txt
          echo "protocol.txt found"

      - name: Run Claude with Ruflo protocol
        run: |
          mkdir -p outputs

          claude -p "$(cat <<'EOF'
          You are running inside GitHub Actions.

          Use Ruflo as the orchestration/MCP/plugin layer.

          Read the file protocol.txt from the repository root.
          Follow protocol.txt exactly.

          Important:
          - Treat protocol.txt as the source of truth.
          - Enforce the strict 7-day research window.
          - Use the available API keys from environment variables.
          - Produce both outputs:
            1. outputs/research-digest.md
            2. outputs/research-payload.json

          Before writing final files, verify that the protocol sections are present:
          Marine Autonomy & Reasoning,
          Hydrodynamics,
          Marine Technologies,
          AUV Systems & Swarms,
          General Robotics & AI.

          Now execute the research workflow described in protocol.txt.
          EOF
          )"

      - name: Upload research outputs
        uses: actions/upload-artifact@v4
        with:
          name: ruflo-research-output
          path: outputs/
