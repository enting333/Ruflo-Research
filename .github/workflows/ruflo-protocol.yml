name: Ruflo Research Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  NODE_ENV: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Install Claude
        run: npm install -g @anthropic-ai/claude-code@2.1.126

      - name: Install ruflo
        run: npm install -g ruflo@3.6.12
        
      - name: Install dependencies
        run: npm install
      
      - name: Initialize Ruflo
        run: npx ruflo@latest init --force
      
      - name: Initialize Ruflo memory
        run: |
          npx ruflo@latest memory init
          
      - name: Start Ruflo daemon
        run: |
          npx ruflo@latest start 
          npx ruflo@latest daemon status || echo "DAEMON_NOT_RUNNING"
          npx ruflo@latest agents list
      
      - name: Verify protocol exists
        run: |
          test -f protocol.txt
          echo "protocol.txt found"
          
          npx ruflo@latest doctor
      - name: Run Claude with Ruflo protocol
        run: |
          npx -y @anthropic-ai/claude-code mcp add ruflo -- npx -y ruflo@latest mcp start
          npx -y @anthropic-ai/claude-code mcp list
          export TODAY=$(date +'%Y-%m-%d')
          set -euo pipefail

          pwd
          ls -la
          test -f protocol.txt
      
          mkdir -p outputs
      
          npx -y @anthropic-ai/claude-code --dangerously-skip-permissions -p "$(cat protocol.txt)"
          
          Today is $TODAY.
          Use this as the reference date for all paper filtering
          
          You are running inside GitHub Actions.

          Use Ruflo as the orchestration/MCP/plugin layer.

          Read the file protocol.txt from the repository root.
          Follow protocol.txt exactly.

          Important:
          - Treat protocol.txt as the source of truth.
          - Enforce the strict 7-day research window.
          - Use the available API keys from environment variables.
          - Produce both outputs:
            1. outputs/research-digest.md
            2. outputs/research-payload.json

          Now execute the research workflow described in protocol.txt.
          EOF
          )"

          echo "Checking outputs..."
          ls -la outputs
          test -s outputs/research-digest.md
          test -s outputs/research-payload.json

      - name: Upload research outputs
        uses: actions/upload-artifact@v4
        with:
          name: ruflo-research-output
          path: outputs/
