name: Ruflo Research Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  NODE_ENV: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: npm install
      
      - name: Initialize Ruflo
        run: npx ruflo@latest init --force
      
      - name: Initialize Ruflo memory
        run: npx ruflo@latest memory init
      
      - name: Start Ruflo daemon
        run: npx ruflo@latest start
      
      - name: Run Ruflo research swarm
        run: npm run research -- protocol.txt
      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruflo-research-digest
          path: |
            dist/ruflo-prompt.txt
            dist/ruflo-research.md
            dist/ruflo-research.json
            dist/ruflo-research.raw.json
          if-no-files-found: warn
