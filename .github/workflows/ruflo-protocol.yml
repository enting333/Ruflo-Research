name: Ruflo Research Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  NODE_ENV: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.126
      
      - name: Initialize Ruflo Environment
        run: |
          # npx ruflo@latest init --force automatically configures the MCP bridge
          npx ruflo@latest init --force
          npx ruflo@latest memory init
          npx ruflo@latest start --daemon
          
      - name: Verify Environment
        run: |
          test -f protocol.txt
          npx ruflo@latest doctor
          npx -y @anthropic-ai/claude-code mcp list

      - name: Run Autonomous Research Task
        run: |
          export TODAY=$(date +'%Y-%m-%d')
          mkdir -p outputs
          
          # Using heredoc to pass the multi-line prompt to Claude
          claude --dangerously-skip-permissions <<EOF
          Today is $TODAY. 
          Use this as the reference date for all paper filtering.
          
          You are running inside GitHub Actions using the Ruflo orchestration layer.
          
          TASK:
          1. Read protocol.txt from the repository root.
          2. Follow protocol.txt exactly as the source of truth.
          3. Enforce the strict 7-day research window.
          4. Use available API keys (Tavily, SerpApi, etc.) via Ruflo tools.
          
          OUTPUTS REQUIRED:
          - Save a markdown report to outputs/research-digest.md
          - Save raw data to outputs/research-payload.json
          
          Execute the research workflow now.
          EOF

      - name: Verify and Upload Outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ruflo-research-output
          path: outputs/
